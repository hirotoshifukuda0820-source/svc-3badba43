<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>スミリオン経営参謀</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@700;800&family=IBM+Plex+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F1F4F4; --panel:#FFFFFF; --ink:#1B2833; --sub:#5C6E7A; --line:#D9E0E1; --hot:#AF3B28; --cool:#20707F;
  --serif:"Shippori Mincho B1","Hiragino Mincho ProN","Yu Mincho",serif;
  --sans:"IBM Plex Sans JP","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:4px;padding:40px 36px;max-width:380px;width:100%;text-align:center}
.eyebrow{font-size:.72rem;letter-spacing:.2em;color:var(--sub);margin-bottom:10px}
h1{font-family:var(--serif);font-weight:800;font-size:1.3rem;margin-bottom:6px}
.sub{font-size:.82rem;color:var(--sub);margin-bottom:26px}
input{width:100%;font-family:var(--sans);font-size:.95rem;padding:11px 14px;border:1px solid var(--line);border-radius:2px;text-align:center;letter-spacing:.05em}
input:focus{outline:2px solid var(--cool);outline-offset:1px}
button{width:100%;margin-top:12px;padding:11px;background:var(--ink);color:#fff;border:none;border-radius:2px;font-family:var(--sans);font-size:.9rem;font-weight:700;cursor:pointer;letter-spacing:.05em}
button:hover{background:#0f1922}
button:focus-visible{outline:2px solid var(--cool);outline-offset:2px}
.err{color:var(--hot);font-size:.8rem;margin-top:10px;min-height:1.2em}
</style>
</head>
<body>
<div class="card">
  <div class="eyebrow">スミリオン経営参謀</div>
  <h1>IT供給勢力図</h1>
  <p class="sub">閲覧用パスワードを入力してください</p>
  <input type="password" id="pw" autocomplete="off" placeholder="パスワード" autofocus>
  <button id="go">表示する</button>
  <div class="err" id="err"></div>
</div>
<script>
const HASH = "557ec6d7ac8c335860a36e07d1537548130c608c287d97a9a0ff3709928cd3c4";
const TARGET = "report-3badba43.html";
async function sha256(text){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function tryPass(v){
  const h = await sha256(v);
  if(h === HASH){
    localStorage.setItem('itmap_ok','1');
    location.href = TARGET;
    return true;
  }
  return false;
}
async function check(){
  const ok = await tryPass(document.getElementById('pw').value);
  if(!ok) document.getElementById('err').textContent = 'パスワードが違います';
}
document.getElementById('go').addEventListener('click', check);
document.getElementById('pw').addEventListener('keydown', e=>{ if(e.key==='Enter') check(); });

// 既にこの端末で認証済みなら即通過（毎回の入力を省く）
if(localStorage.getItem('itmap_ok')==='1'){ location.href = TARGET; }
// SharePoint埋め込み用: URLに ?p=パスワード を付けておくと自動通過（SharePoint側の閲覧権限が実質のゲートになる）
const auto = new URLSearchParams(location.search).get('p');
if(auto) tryPass(auto);
</script>
</body>
</html>
